spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# middleware 环境下可经环境变量覆盖意图 LLM（与 agent-core 独立）
ai:
  gateway:
    intent:
      llm:
        enabled: ${AI_GATEWAY_INTENT_LLM_ENABLED:false}
        provider: ${AI_GATEWAY_INTENT_LLM_PROVIDER:ollama}
        api-key: ${AI_GATEWAY_INTENT_LLM_API_KEY:}
        base-url: ${AI_GATEWAY_INTENT_LLM_BASE_URL:}
        model: ${AI_GATEWAY_INTENT_LLM_MODEL:}
        ollama-base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        ollama-model: ${OLLAMA_MODEL_NAME:qwen2.5:7b}
        temperature: ${AI_GATEWAY_INTENT_LLM_TEMPERATURE:0.1}

