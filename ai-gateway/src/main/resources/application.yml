server:
  port: 8080

spring:
  application:
    name: ai-gateway
  profiles:
    default: local
  config:
    import: optional:classpath:intent-routing-rules.yml

ai:
  gateway:
    intent:
      low-confidence-threshold: 0.6
      # 低置信度时用 LLM 做意图分类；不配置或 enabled: false 则仅关键词
      llm:
        enabled: false
        provider: ollama
        ollama-base-url: http://localhost:11434
        ollama-model: qwen2.5:7b
        temperature: 0.1
        # 使用 OpenAI 兼容 API 时示例：
        # enabled: true
        # provider: openai
        # base-url: https://api.deepseek.com/v1
        # api-key: ${LLM_API_KEY:}
        # model: deepseek-chat
    route:
      default-service: agent-core
      timeout-ms: 30000
      enable-fallback: true
    rate-limit:
      enabled: true
      requests-per-minute: 60
      burst-capacity: 10
    auth:
      enabled: true
      jwt-secret: ${JWT_SECRET:default-secret-key}
      token-expiry-minutes: 60

agent-core:
  base-url: http://localhost:8081
  connect-timeout: 5000
  read-timeout: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.returensea: DEBUG
  # 本地测试：与 core、legacy 统一输出到 ai-agent-platform/logs/ 便于排查
  file:
    name: ../../logs/ai-gateway.log
