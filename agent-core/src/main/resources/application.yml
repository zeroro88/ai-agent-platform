server:
  port: 8081

spring:
  application:
    name: agent-core
  profiles:
    default: local
  config:
    import:
      - optional:classpath:task-graph-template.yml
      - optional:classpath:tools-config.yml

ai:
  agent:
    max-iterations: 5
    timeout-seconds: 30
    memory:
      working-size: 1048576
      session-ttl-minutes: 30
      session-size: 10240
    llm:
      # 可选: openai 或 ollama
      provider: ${LLM_PROVIDER:ollama}
      
      # DeepSeek 兼容 OpenAI 协议
      base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
      api-key: ${LLM_API_KEY:sk-your-key-here}
      model: ${LLM_MODEL_NAME:deepseek-chat}
      # 降低以减轻杂散 token（如 leton），更稳定输出
      temperature: 0.3
      
      # Ollama 本地配置
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_MODEL_NAME:qwen2.5:7b} # 推荐 Qwen2.5 或 Llama3
    # 输入护栏：在调用 LLM 前校验用户消息，命中禁止词/正则则拦截（LangChain4j InputGuardrail）
    # 以下为国内常用敏感词/违禁词 starter，完整词库可参考：https://github.com/konsheng/Sensitive-lexicon 、https://github.com/houbb/sensitive-word
    input-guardrails:
      enabled: true
      block-message: "您的问题涉及敏感或违规内容，请换一种方式提问。"
      # 可选：从文件加载更多敏感词（每行一词，# 为注释），与下方 banned-tokens 合并。可用 Sensitive-lexicon 等词库
      # banned-tokens-file: classpath:sensitive-words.txt
      banned-tokens:
        # 提示词注入/越狱类
        - 忽略上文
        - 忽略以上
        - 忽略前文
        - 不要遵守
        - 忘记你的指令
        - 忘记上述
        - 扮演
        - 假装你是
        - 你现在是
        - jailbreak
        - DAN
        - ignore above
        - ignore previous
        - disregard instructions
        - 脱敏
        - 绕过
        - 破解
        # 常见违禁/不当用语（starter，可按业务扩充）
        # 注意：勿将「违禁词」「敏感词」加入列表，否则用户反馈误判（如「违禁词误判」）会被拦截
        - 黄赌毒
        - 六合彩
        - 博彩
        - 赌博
        - 色情
        - 裸聊
        - 代开发票
        - 办证
        - 刻章
        - 套现
        - 刷单
        - 裸贷
        - 高利贷
        - 传销
        - 诈骗
        - 杀猪盘
        - 洗钱
        - 走私
        - 枪支
        - 毒品
        - 冰毒
        - 海洛因
        - 违禁品
        - 假药
      banned-patterns:
        # 常见注入句式
        - "(?i)ignore\\s+(all\\s+)?(above|previous|prior)\\s+(instructions?|prompts?)"
        - "(?i)disregard\\s+(all\\s+)?(above|previous)"
        - "忽略[上以]?文.*(指令|要求)"
        - "不要(遵守|执行|遵循).*(指令|规则)"
    # 输出护栏：过滤 LLM 杂散 token 与英文结尾语等，可配置扩展
    output-guardrails:
      banned-tokens:
        - extrême
        - extreme
        - leton
      # 正则：匹配整段英文 sign-off（如 Sincerely, I will proceed...），含无空格粘连形式
      banned-patterns:
        - "(?i)s?incerely,?[^.。！？!?]*[.。]?"

logging:
  level:
    com.returensea: DEBUG
  # 本地测试：与 gateway、legacy 统一输出到 ai-agent-platform/logs/ 便于排查
  file:
    name: ../../logs/agent-core.log
