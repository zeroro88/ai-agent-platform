server:
  port: 8081

spring:
  application:
    name: agent-core
  config:
    import:
      - optional:classpath:task-graph-template.yml
      - optional:classpath:tools-config.yml
  # 临时禁用 Redis，使用内存 Map
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

ai:
  agent:
    max-iterations: 5
    timeout-seconds: 30
    memory:
      working-size: 1048576
      session-ttl-minutes: 30
      session-size: 10240
    llm:
      # 可选: openai 或 ollama
      provider: ${LLM_PROVIDER:ollama}
      
      # DeepSeek 兼容 OpenAI 协议
      base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
      api-key: ${LLM_API_KEY:sk-your-key-here}
      model: ${LLM_MODEL_NAME:deepseek-chat}
      temperature: 0.7
      
      # Ollama 本地配置
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_MODEL_NAME:qwen2.5:7b} # 推荐 Qwen2.5 或 Llama3

logging:
  level:
    com.returensea: DEBUG
